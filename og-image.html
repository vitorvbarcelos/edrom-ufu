<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{width:1200px;height:630px;overflow:hidden;font-family:'Inter',sans-serif;
    background:
      radial-gradient(680px circle at 82% 20%, rgba(79,74,158,.5), transparent 60%),
      radial-gradient(560px circle at 6% 96%, rgba(61,64,125,.55), transparent 60%),
      radial-gradient(440px circle at 60% 8%, rgba(255,210,63,.12), transparent 60%),
      #100F24;
    color:#F4F3FB; position:relative;}
  .grid{position:absolute;inset:0;opacity:.5;
    background-image:linear-gradient(rgba(157,180,232,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(157,180,232,.06) 1px,transparent 1px);
    background-size:48px 48px;}
  .wrap{position:relative;height:100%;display:flex;align-items:center;gap:56px;padding:0 80px;}
  .sym{width:300px;filter:drop-shadow(0 0 50px rgba(255,210,63,.35));}
  .txt{flex:1;}
  .eyebrow{font-family:'Press Start 2P',monospace;font-size:15px;letter-spacing:3px;color:#FFD23F;text-transform:uppercase;display:inline-flex;align-items:center;gap:14px;}
  .eyebrow::before{content:'';width:40px;height:3px;background:#FFD23F;}
  h1{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:66px;line-height:1.02;letter-spacing:-.02em;margin:20px 0 10px;}
  h1 .hl{color:#FFD23F;}
  p{font-size:26px;color:#9DB4E8;max-width:640px;line-height:1.4;}
  .tag{margin-top:26px;display:inline-flex;align-items:center;gap:12px;font-size:20px;color:#F4F3FB;}
  .tag b{color:#FFD23F;}
  .foot{position:absolute;bottom:40px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:center;color:rgba(157,180,232,.75);font-size:20px;border-top:1px solid rgba(157,180,232,.2);padding-top:20px;}
  .chips{display:flex;gap:12px;}
  .chip{background:rgba(25,24,51,.8);border:1px solid rgba(157,180,232,.2);border-radius:999px;padding:8px 18px;font-size:17px;color:#9DB4E8;}
  .chip b{color:#FFD23F;}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="wrap">
    <img class="sym" src="assets/marca/simbolo-edrom.png" alt="">
    <div class="txt">
      <span class="eyebrow">UFU · FEMEC · DESDE 2008</span>
      <h1>Equipe de Desenvolvimento<br>em <span class="hl">Robótica Móvel</span></h1>
      <p>Robôs humanoides autônomos que jogam futebol sozinhos.</p>
      <div class="chips" style="margin-top:26px;">
        <span class="chip"><b>25+</b> premiações</span>
        <span class="chip"><b>3º</b> lugar CBR 2025</span>
        <span class="chip">Humanoid Soccer League</span>
      </div>
    </div>
  </div>
  <div class="foot"><span>edrom-ufu.vercel.app</span><span>@edromufu</span></div>
</body>
</html>
