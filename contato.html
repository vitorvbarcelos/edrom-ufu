<body data-page="contato">

  <main>
    <section class="page-hero">
      <div class="container">
        <span class="eyebrow reveal">CONTATO</span>
        <h1 class="reveal" data-delay="1">Vamos <span class="hl">conversar</span>.</h1>

    <section class="section section--tight" id="contato">

        <div class="contato-grid">
          <div class="reveal" data-delay="1">
            <div class="contato-item">

                <a href="mailto:edromufu@gmail.com">edromufu@gmail.com</a>
              </div>
            </div>
            <div class="contato-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
              <div>
                <h4>Endereço</h4>
                <p>Bloco 1M, Campus UFU Santa Mônica<br>Uberlândia – MG, 38408-100</p>
              </div>
            </div>
            <div class="social-row">
              <a href="https://instagram.com/edromufu" target="_blank" rel="noopener" aria-label="Instagram @edromufu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>

              <a href="https://facebook.com/edromufu" target="_blank" rel="noopener" aria-label="Facebook /edromufu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
